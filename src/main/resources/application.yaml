server:
  port: 8081

spring:
  application:
    name: pr-sense

  output:
    ansi:
      enabled: always   # Force ANSI color codes even when output is piped

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}  # reuse the key already set under openai.api-key
      chat:
        options:
          model: ${openai.model:gpt-4o}
          max-tokens: 4096
          temperature: 0.3
    mcp:
      server:
        enabled: true
        name: prsense-mcp-server
        version: 1.0.0
        type: SYNC            # Synchronous tool execution — compatible with Spring MVC

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5435/prsense}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate         # Flyway owns the schema; Hibernate only validates
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

azure:
  devops:
    org: <YOUR_AZURE_DEVOPS_ORG>
    pat: <YOUR_AZURE_DEVOPS_PAT>
    base-url: https://dev.azure.com/<YOUR_AZURE_DEVOPS_ORG>

openai:
  api-key: <YOUR_OPENAI_API_KEY>
  model: gpt-4o
  max-tokens: 4096
  temperature: 0.3

webhook:
  secret: dummy

review:
  max-files: 15
  max-lines: 300
  skip-extensions:
    - .yml
    - .yaml
    - .xml
    - .sql
    - .json
    - .md
    - .txt
    - .properties
  thread-pool-size: 5

embedding:
  model: text-embedding-3-small
  dimensions: 1536
  batch-size: 20

indexing:
  chunk-batch-size: 10
  max-file-size-bytes: 102400    # 100 KB
  supported-extensions:
    - .java
  sync-enabled: true
  sync-interval-ms: 900000       # 15 minutes between scheduled syncs
  sync-initial-delay-ms: 60000   # 1 minute delay before first scheduled sync

prsense:
  mcp:
    enabled: true
    default-search-limit: 10
    max-search-limit: 50
    server-name: prsense-mcp-server

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true

vector:
  search-limit: 10
  dimensions: 1536
