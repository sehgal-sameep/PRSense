server:
  port: 8081

spring:
  application:
    name: pr-sense

  output:
    ansi:
      enabled: always   # Force ANSI color codes even when output is piped

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5435/prsense}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate         # Flyway owns the schema; Hibernate only validates
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

azure:
  devops:
    org: <YOUR_AZURE_DEVOPS_ORG>
    pat: <YOUR_AZURE_DEVOPS_PAT>
    base-url: https://dev.azure.com/<YOUR_AZURE_DEVOPS_ORG>

openai:
  api-key: <YOUR_OPENAI_API_KEY>
  model: gpt-4o
  max-tokens: 4096
  temperature: 0.3

webhook:
  secret: dummy

review:
  max-files: 15
  max-lines: 300
  skip-extensions:
    - .yml
    - .yaml
    - .xml
    - .sql
    - .json
    - .md
    - .txt
    - .properties
  thread-pool-size: 5

embedding:
  model: text-embedding-3-small
  dimensions: 1536
  batch-size: 20

indexing:
  chunk-batch-size: 10
  max-file-size-bytes: 102400    # 100 KB
  supported-extensions:
    - .java

vector:
  search-limit: 10
  dimensions: 1536
